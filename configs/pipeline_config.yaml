# =============================================================================
# Dental CBCT Segmentation Pipeline — Master Configuration
# =============================================================================
# This file controls every aspect of the pipeline: dataset paths, nnU-Net
# parameters, training hyper-parameters, evaluation post-processing, and
# visualization defaults.
#
# QUICK START:
#   1. Set  paths.dataset_root  to your local ToothFairy3 directory.
#   2. Run  python scripts/01_validate_dataset.py --config configs/pipeline_config.yaml
#   3. Proceed with preprocessing → training → evaluation.
#
# All relative paths are resolved from the project root directory
# (the parent of this configs/ folder).
# =============================================================================

# ---------------------------------------------------------------------------
# Project metadata
# ---------------------------------------------------------------------------
project:
  name: "dental-cbct-segmentation"
  description: "Production segmentation pipeline for dental CBCT volumes (ToothFairy3)"
  seed: 42                         # Global random seed for reproducibility

# ---------------------------------------------------------------------------
# Paths — the ONLY section a new user MUST edit
# ---------------------------------------------------------------------------
paths:
  # Absolute path to the raw ToothFairy3 dataset (read-only).
  # Must contain:  imagesTr/  labelsTr/  dataset.json
  dataset_root: "/usershome/cs671_user15/Dobbe AI/ToothFairy3"          # ← USER: set this

  # All pipeline outputs go here (created automatically)
  output_root: "./outputs"

  # nnU-Net directory structure (env vars are set automatically)
  nnunet_raw: "./outputs/nnunet_raw"
  nnunet_preprocessed: "./outputs/nnunet_preprocessed"
  nnunet_results: "./outputs/nnunet_results"

  # Post-training artefacts
  predictions: "./outputs/predictions"
  metrics: "./outputs/metrics"
  visualizations: "./outputs/visualizations"
  validation_report: "./outputs/validation_report"
  logs: "./outputs/logs"

# ---------------------------------------------------------------------------
# Dataset — must match the dataset.json that ships with ToothFairy3
# ---------------------------------------------------------------------------
dataset:
  id: 100                           # nnU-Net dataset ID (Dataset100_…)
  name: "Dataset100_ToothFairy3"
  num_classes: 77                    # 76 foreground + 1 background
  num_volumes: 532                   # Total CBCT volumes in the dataset
  file_ending: ".nii.gz"
  channel_names:
    0: "CBCT"

  # ----- Full label map (from dataset.json) --------------------------------
  # 77 classes with NON-CONTIGUOUS label IDs spanning 0 → 148.
  # nnU-Net handles non-contiguous labels natively.
  labels:
    0: "background"
    1: "Lower Jawbone"
    2: "Upper Jawbone"
    3: "Left Inferior Alveolar Canal"
    4: "Right Inferior Alveolar Canal"
    5: "Left Maxillary Sinus"
    6: "Right Maxillary Sinus"
    7: "Pharynx"
    8: "Bridge"
    9: "Crown"
    10: "Implant"
    # ---- Upper-right quadrant teeth (FDI 11–18) ---
    11: "Tooth 11"
    12: "Tooth 12"
