    14: "Tooth 14"
    15: "Tooth 15"
    16: "Tooth 16"
    17: "Tooth 17"
    18: "Tooth 18"
    # ---- Upper-left quadrant teeth (FDI 21–28) ---
    21: "Tooth 21"
