# ---------------------------------------------------------------------------
# nnU-Net — training & inference settings
# ---------------------------------------------------------------------------
nnunet:
  configuration: "3d_fullres"        # Options: 3d_fullres, 3d_lowres, 3d_cascade_fullres
  trainer: "nnUNetTrainer"           # Default nnU-Net trainer class
  plans: "nnUNetPlans"               # Plans file identifier
  folds: [0]                         # Folds to train; use [0,1,2,3,4] for full 5-fold CV
  num_processes: 8                   # Parallel workers for preprocessing / inference

# ---------------------------------------------------------------------------
# Training
# ---------------------------------------------------------------------------
training:
  epochs: 1000                       # nnU-Net default is 1000
  continue_training: false           # Resume from last checkpoint if true
  compile: false                     # torch.compile (PyTorch ≥ 2.0, experimental)

# ---------------------------------------------------------------------------
# Evaluation & post-processing
# ---------------------------------------------------------------------------
evaluation:
  postprocessing:
    min_component_size: 100          # Remove connected components < N voxels
    apply_connected_components: true # Enable/disable CC filtering
  test_time_augmentation: false      # Mirror-axis TTA during inference
  save_softmax: false                # Save full softmax probabilities (large!)

# ---------------------------------------------------------------------------
# Visualization
# ---------------------------------------------------------------------------
visualization:
  num_cases: 3                       # Number of volumes to render
  opacity: 0.3                       # Overlay opacity for segmentation masks
  colormap: "tab20"                  # Matplotlib colormap name
  dpi: 150                           # Figure resolution
  slice_axis: "axial"                # Default slice orientation: axial | coronal | sagittal
  save_format: "png"                 # Output image format
